<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Model Metadata UI</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap { max-width: 900px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { margin: 0 0 18px; opacity: 0.8; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .btn {
      display: block;
      padding: 14px 14px;
      border: 1px solid rgba(0,0,0,0.18);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      background: rgba(0,0,0,0.03);
    }
    .btn:hover { background: rgba(0,0,0,0.06); }
    .tag { font-size: 12px; opacity: 0.7; margin-top: 6px; }
    .note { margin-top: 20px; font-size: 12px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Model metadata</h1>
    <p>Select a model type to start entering metadata.</p>

    <div class="grid">
      <a class="btn" href="/ui/pbpk">
        PBPK
        <div class="tag">Physiologically Based PK</div>
      </a>

      <a class="btn" href="/ui/pbpk#coming-soon">
        QSAR
        <div class="tag">Coming soon</div>
      </a>

      <a class="btn" href="/ui/pbpk#coming-soon">
        qAOP
        <div class="tag">Coming soon</div>
      </a>

      <a class="btn" href="/ui/pbpk#coming-soon">
        NAM
        <div class="tag">Coming soon</div>
      </a>
    </div>

    <div class="note">
      PBPK is implemented now. Other model types can be added as separate UIs later (e.g., <code>/ui/qsar</code>).
    </div>
  </div>
</body>
</html>
