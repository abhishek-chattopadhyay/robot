<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PBPK Metadata UI (v1)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; max-width: 1100px; }
    .row { display: flex; gap: 16px; align-items: flex-start; }
    .col { flex: 1; min-width: 0; }
    textarea { width: 100%; min-height: 240px; font-family: ui-monospace, monospace; font-size: 12px; }
    pre { background: #f6f8fa; padding: 12px; overflow: auto; }
    button { padding: 8px 12px; margin: 4px 6px 4px 0; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:#eee; font-size:12px; margin-left:8px; }
    .ok { background:#d1fae5; }
    .bad { background:#fee2e2; }
    .muted { color:#555; font-size: 13px; }
    .field { margin: 10px 0; }
    input[type="text"] { width: 100%; padding: 8px; }
    .section { border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin: 12px 0; }
    .section h3 { margin: 0 0 8px 0; }
    .nav-links { margin-bottom: 12px; font-size: 14px; }
    .nav-links a { color: #2563eb; text-decoration: none; margin-right: 16px; }
    .nav-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>PBPK Metadata UI <span class="pill">v1</span></h1>
  <p class="muted">Thin UI that calls your existing API: drafts → form-ui → apply-edits/array → validate → build → download.</p>
  <div class="nav-links">
    <a href="/ui/qaop">qAOP Editor →</a>
  </div>

  <div class="section">
    <h3>1) Load metadata JSON</h3>
    <div class="row">
      <div class="col">
        <div class="field">
          <label><b>Paste PBPK metadata JSON</b></label>
          <textarea id="metadata"></textarea>
        </div>
        <button onclick="createDraft()">Create Draft</button>
        <button onclick="refreshFormUI()">Refresh Form UI</button>
      </div>
      <div class="col">
        <div><b>Draft</b> <span id="draftPill" class="pill">none</span></div>
        <pre id="draftOut">{}</pre>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>2) Quick edits</h3>
    <div class="row">
      <div class="col">
        <div class="field">
          <label><b>Model name</b> (writes to <code>/general_model_information/model_name</code>)</label>
          <input id="modelName" type="text" placeholder="Type a model name..." />
        </div>
        <button onclick="applyEdits()">Apply edits (one call)</button>

        <hr />

        <div class="field">
          <label><b>Append evaluation activity</b> (writes to <code>/model_evaluation_and_validation/evaluation_activities</code>)</label>
          <input id="evalDesc" type="text" placeholder="evaluation_description" />
        </div>
        <button onclick="appendEval()">Append</button>
        <button onclick="validateDraft()">Validate Draft</button>
        <button onclick="buildCrate()">Build RO-Crate</button>
      </div>
      <div class="col">
        <div><b>Last API response</b></div>
        <pre id="apiOut">{}</pre>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>3) Form UI snapshot (from <code>/v1/form-ui/pbpk</code>)</h3>
    <button onclick="refreshFormUI()">Reload</button>
    <pre id="formUIOut">{}</pre>
  </div>

<script>
const API = "http://127.0.0.1:8000";
let DRAFT_ID = null;

function setPill(ok, text) {
  const el = document.getElementById("draftPill");
  el.textContent = text;
  el.classList.remove("ok","bad");
  if (ok === true) el.classList.add("ok");
  if (ok === false) el.classList.add("bad");
}

function pretty(o){ return JSON.stringify(o, null, 2); }

async function api(method, path, body=null) {
  const opts = { method, headers: {} };
  if (body !== null) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(API + path, opts);
  const ct = r.headers.get("content-type") || "";
  const txt = await r.text();
  if (!r.ok) {
    // surface the server message clearly
    throw new Error(`HTTP ${r.status} ${r.statusText}\n${txt}`);
  }
  if (ct.includes("application/json")) return JSON.parse(txt);
  return txt;
}

function readMetadataTextarea() {
  const raw = document.getElementById("metadata").value.trim();
  if (!raw) throw new Error("Paste metadata JSON first.");
  return JSON.parse(raw);
}

async function createDraft() {
  try {
    const md = readMetadataTextarea();
    const out = await api("POST", "/v1/drafts", md);
    DRAFT_ID = out.draft_id;
    setPill(true, DRAFT_ID);
    document.getElementById("draftOut").textContent = pretty(out);
    document.getElementById("apiOut").textContent = pretty(out);
    await refreshFormUI();
  } catch (e) {
    setPill(false, "error");
    document.getElementById("apiOut").textContent = String(e);
  }
}

async function refreshFormUI() {
  try {
    let payload;
    if (DRAFT_ID) payload = { draft_id: DRAFT_ID };
    else payload = readMetadataTextarea();

    const out = await api("POST", "/v1/form-ui/pbpk?include_helptexts=false&include_vocabularies=true", payload);
    document.getElementById("formUIOut").textContent = pretty(out);
    document.getElementById("apiOut").textContent = pretty(out);
  } catch (e) {
    document.getElementById("apiOut").textContent = String(e);
  }
}

async function applyEdits() {
  try {
    if (!DRAFT_ID) throw new Error("Create a draft first.");
    const modelName = document.getElementById("modelName").value.trim();
    if (!modelName) throw new Error("Enter a model name first.");
    const out = await api("POST", `/v1/drafts/${DRAFT_ID}/apply-edits`, {
      edits: { "/general_model_information/model_name": modelName }
    });
    document.getElementById("apiOut").textContent = pretty(out);
    document.getElementById("draftOut").textContent = pretty(out.draft || out);
    await refreshFormUI();
  } catch (e) {
    document.getElementById("apiOut").textContent = String(e);
  }
}

async function appendEval() {
  try {
    if (!DRAFT_ID) throw new Error("Create a draft first.");
    const desc = document.getElementById("evalDesc").value.trim() || "Added via UI";
    const out = await api("POST", `/v1/drafts/${DRAFT_ID}/apply-array`, {
      array_path: "/model_evaluation_and_validation/evaluation_activities",
      action: "append",
      value: {
        evaluation_description: desc,
        evaluation_method: "Visual comparison",
        evaluation_outcome: "OK"
      }
    });
    document.getElementById("apiOut").textContent = pretty(out);
    document.getElementById("draftOut").textContent = pretty(out.draft || out);
    await refreshFormUI();
  } catch (e) {
    document.getElementById("apiOut").textContent = String(e);
  }
}

async function validateDraft() {
  try {
    if (!DRAFT_ID) throw new Error("Create a draft first.");
    const out = await api("POST", `/v1/drafts/${DRAFT_ID}/validate`, {});
    document.getElementById("apiOut").textContent = pretty(out);
    document.getElementById("draftOut").textContent = pretty(out);
  } catch (e) {
    document.getElementById("apiOut").textContent = String(e);
  }
}

async function buildCrate() {
  try {
    if (!DRAFT_ID) throw new Error("Create a draft first.");
    const out = await api("POST", `/v1/drafts/${DRAFT_ID}/build`, {});
    document.getElementById("apiOut").textContent = pretty(out);
    const crateId = (out.build || {}).crate_id;
    if (crateId) {
      // provide a direct download link (still via API)
      const link = `${API}/v1/rocrate/${crateId}/download`;
      document.getElementById("apiOut").textContent += `\n\nDownload: ${link}\n`;
    }
  } catch (e) {
    document.getElementById("apiOut").textContent = String(e);
  }
}
</script>
</body>
</html>
