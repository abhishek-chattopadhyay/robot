metadata_standard:
  name: "PBPK Model Reporting Template"
  source:
    title: "PBPK model reporting template for chemical risk assessment applications"
    authors: ["Tan", "et al."]
    year: 2020
    journal: "Regulatory Toxicology and Pharmacology"
    doi: "10.1016/j.yrtph.2020.104673"
  version: "1.0"

sections:
  - id: general_model_information
    title: "General Model Information"
    description: >
      Information required to uniquely identify the PBPK model,
      its provenance, authorship, licensing, and computational implementation.
    required: true

    items:
      - id: model_name
        label: "Model name"
        description: >
          A unique name identifying the PBPK model.
        required: true
        value_type: string
        cardinality: one

      - id: model_version
        label: "Model version"
        description: >
          Version identifier of the model used for the reported simulations.
        required: true
        value_type: string
        cardinality: one

      - id: model_description
        label: "Model description"
        description: >
          Brief narrative description of the model scope and purpose.
        required: true
        value_type: text
        cardinality: one

      - id: model_authors
        label: "Model author(s)"
        description: >
          Person(s) who developed the PBPK model.
        required: true
        value_type: agent
        cardinality: many
        agent_fields:
          - full_name
          - orcid
          - affiliation

      - id: affiliations
        label: "Author affiliation(s)"
        description: >
          Institutional affiliation(s) of the model authors.
        required: false
        value_type: organization
        cardinality: many
        organization_fields:
          - name
          - address
          - country

      - id: software_platform
        label: "Software platform"
        description: >
          Software or programming environment used to implement the model.
        required: true
        value_type: controlled_term
        allowed_values:
          - SBML
          - Python
          - R
          - MATLAB
          - Other

      - id: software_version
        label: "Software version"
        description: >
          Version of the software or programming environment.
        required: false
        value_type: string
        cardinality: one

      - id: model_availability
        label: "Model availability"
        description: >
          Persistent location(s) where the model code or files are available.
        required: true
        value_type: uri
        cardinality: many

      - id: license
        label: "Model license"
        description: >
          License under which the PBPK model and associated metadata are released.
        required: true
        value_type: controlled_term
        examples:
          - "CC-BY-4.0"
          - "CC-BY-NC-4.0"
          - "MIT"
          - "GPL-3.0"
          - "Custom"

      - id: intended_application
        label: "Intended application"
        description: >
          Intended regulatory or scientific application of the PBPK model.
        required: true
        value_type: controlled_text
        examples:
          - "Human health risk assessment"
          - "Dose extrapolation"
          - "Chemical prioritization"

      - id: limitations_summary
        label: "Model limitations (summary)"
        description: >
          High-level description of known limitations of the model.
        required: false
        value_type: text
        cardinality: one

      - id: biological_system_description
        title: "Biological System Description"
        description: >
          Description of the biological system(s) represented in the PBPK model,
          including species, life stage, population characteristics, and
          physiological compartments.
        required: true

        items:
          - id: biological_systems
            label: "Biological system(s)"
            description: >
              One or more biological systems represented by the PBPK model.
              Each biological system corresponds to a specific species and
              physiological context.
            required: true
            value_type: entity
            cardinality: many

            entity_fields:
              - id: species
                label: "Species"
                description: >
                  Biological species represented by the model.
                required: true
                value_type: controlled_term
                examples:
                  - "Homo sapiens"
                  - "Rattus norvegicus"
                  - "Mus musculus"

              - id: life_stages
                label: "Life stage(s)"
                description: >
                  Life stage(s) of the organism represented (e.g. adult, juvenile).
                required: true
                value_type: controlled_term
                cardinality: many
                examples:
                  - "Adult"
                  - "Neonate"
                  - "Pregnant"

              - id: population_description
                label: "Population description"
                description: >
                  Description of the population represented by the model, including
                  sex, health status, and any special characteristics.
                required: false
                value_type: text

              - id: physiological_scope
                label: "Physiological scope"
                description: >
                  Description of the physiological systems and processes represented
                  (e.g. whole-body, specific organs).
                required: true
                value_type: controlled_text

              - id: compartments
                label: "Physiological compartments"
                description: >
                  Physiological compartments included in the PBPK model for this
                  biological system.
                required: true
                value_type: controlled_term
                cardinality: many
                examples:
                  - "Liver"
                  - "Kidney"
                  - "Blood"
                  - "Lung"
                  - "Fat"

              - id: anatomical_assumptions
                label: "Anatomical assumptions"
                description: >
                  Key anatomical assumptions made in representing the biological
                  system.
                required: false
                value_type: text

      - id: chemical_description
        title: "Chemical(s) Description"
        description: >
          Description of the chemical substance(s) represented in the PBPK model,
          including identity, role in the model, and key physicochemical properties
          relevant to pharmacokinetics.
        required: true

        items:
          - id: chemicals
            label: "Chemical substance(s)"
            description: >
              One or more chemical substances represented in the PBPK model.
            required: true
            value_type: entity
            cardinality: many

            entity_fields:
              - id: chemical_name
                label: "Chemical name"
                description: >
                  Common or systematic name of the chemical substance.
                required: true
                value_type: string

              - id: chemical_role
                label: "Role in the model"
                description: >
                  Role of the chemical substance within the PBPK model.
                required: true
                value_type: controlled_term
                examples:
                  - "Parent compound"
                  - "Metabolite"
                  - "Co-exposure component"

              - id: chemical_identifiers
                label: "Chemical identifier(s)"
                description: >
                  Persistent identifiers for the chemical substance.
                required: true
                value_type: entity
                cardinality: many

                entity_fields:
                  - id: identifier_type
                    label: "Identifier type"
                    required: true
                    value_type: controlled_term
                    examples:
                      - "CAS RN"
                      - "InChI"
                      - "InChIKey"
                      - "SMILES"
                      - "PubChem CID"

                  - id: identifier_value
                    label: "Identifier value"
                    required: true
                    value_type: string

              - id: molecular_weight
                label: "Molecular weight"
                description: >
                  Molecular weight of the chemical substance.
                required: false
                value_type: number
                unit: "g/mol"

              - id: physicochemical_notes
                label: "Physicochemical notes"
                description: >
                  Additional qualitative information relevant to the chemical
                  properties affecting pharmacokinetics.
                required: false
                value_type: text

      - id: model_structure_and_representation
        title: "Model Structure and Mathematical Representation"
        description: >
          Description of the structural organization and mathematical
          representation of the PBPK model, including compartments,
          interconnections, and implementation references.
        required: true

        items:
          - id: model_structure_description
            label: "Model structure description"
            description: >
              Narrative description of the overall PBPK model structure,
              including how compartments are organized and connected.
            required: true
            value_type: text
            cardinality: one

          - id: structural_compartments
            label: "Structural compartments"
            description: >
              List of compartments included in the PBPK model and their
              role within the model structure.
            required: true
            value_type: entity
            cardinality: many

            entity_fields:
              - id: compartment_name
                label: "Compartment name"
                description: >
                  Name of the compartment as used in the model.
                required: true
                value_type: string

              - id: biological_reference
                label: "Biological reference"
                description: >
                  Corresponding physiological compartment or tissue.
                required: true
                value_type: controlled_term

              - id: compartment_description
                label: "Compartment description"
                description: >
                  Description of the compartment’s role and assumptions.
                required: false
                value_type: text

          - id: inter_compartmental_connections
            label: "Inter-compartmental connections"
            description: >
              Description of flows or connections between compartments
              included in the PBPK model.
            required: true
            value_type: entity
            cardinality: many

            entity_fields:
              - id: source_compartment
                label: "Source compartment"
                required: true
                value_type: string

              - id: target_compartment
                label: "Target compartment"
                required: true
                value_type: string

              - id: connection_type
                label: "Connection type"
                description: >
                  Nature of the connection between compartments.
                required: true
                value_type: controlled_term
                examples:
                  - "Blood flow"
                  - "Diffusion"
                  - "Permeation"

          - id: mathematical_representation
            label: "Mathematical representation"
            description: >
              Description of the mathematical form of the PBPK model
              (e.g. system of ordinary differential equations).
            required: true
            value_type: controlled_text
            examples:
              - "Ordinary differential equations"
              - "Algebraic equations"
              - "Hybrid ODE-algebraic system"

          - id: model_implementation_reference
            label: "Model implementation reference"
            description: >
              Reference to the computational implementation of the model,
              including file names or code locations.
            required: true
            value_type: entity
            cardinality: many

            entity_fields:
              - id: implementation_type
                label: "Implementation type"
                required: true
                value_type: controlled_term
                examples:
                  - "SBML"
                  - "Python script"
                  - "R script"

              - id: implementation_location
                label: "Implementation location"
                required: true
                value_type: string

