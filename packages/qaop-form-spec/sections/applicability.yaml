id: applicability
title: Applicability Domain
description: Taxonomic, sex, life stage, and chemical stressor applicability (completed in Phase 3).
fields:
  - id: species
    path: /applicability/species
    label: Species
    value_type: object
    required: false
    cardinality: many
    help: "Taxonomic applicability with NCBI taxonomy identifiers"
    fields:
      - id: species_name
        path: /applicability/species/*/species_name
        label: Species name
        value_type: string
        required: true
      - id: ncbi_taxonomy_id
        path: /applicability/species/*/ncbi_taxonomy_id
        label: NCBI Taxonomy ID
        value_type: number
        required: false
  - id: chemical_stressors
    path: /applicability/chemical_stressors
    label: Chemical stressors
    value_type: object
    required: false
    cardinality: many
    help: "Chemical stressors associated with this AOP"
    fields:
      - id: name
        path: /applicability/chemical_stressors/*/name
        label: Stressor name
        value_type: string
        required: true
      - id: cas_number
        path: /applicability/chemical_stressors/*/cas_number
        label: CAS number
        value_type: string
        required: false
      - id: stressor_type
        path: /applicability/chemical_stressors/*/stressor_type
        label: Stressor type
        value_type: string
        required: false
