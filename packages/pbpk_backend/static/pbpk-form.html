<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PBPK Metadata Form</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px 60px; }
    .topbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .left { display: flex; gap: 10px; align-items: center; }
    .title { font-size: 18px; font-weight: 650; }
    .pill { font-size: 12px; opacity: 0.75; padding: 3px 8px; border-radius: 999px; border: 1px solid rgba(0,0,0,0.18); }
    .btn { border: 1px solid rgba(0,0,0,0.2); background: rgba(0,0,0,0.03); border-radius: 10px; padding: 9px 12px; cursor: pointer; }
    .btn:hover { background: rgba(0,0,0,0.06); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn.danger { color: #b00020; }
    .row { display:flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .card { border: 1px solid rgba(0,0,0,0.14); border-radius: 14px; padding: 12px; margin: 12px 0; }
    .section-title { font-size: 16px; font-weight: 650; margin: 6px 0 8px; }
    .section-desc { font-size: 12px; opacity: 0.75; margin: 0 0 12px; }
    .field { margin: 10px 0; }
    .label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display:flex; gap:8px; align-items:center; }
    .req { font-size: 11px; opacity: 0.7; border: 1px solid rgba(0,0,0,0.2); border-radius: 999px; padding: 1px 7px; }
    .missing { color: #b00020; font-weight: 700; }
    .small { font-size: 12px; opacity: 0.75; margin-top: 4px; }
    .actions { display:flex; gap: 10px; flex-wrap: wrap; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; }
    pre { white-space: pre-wrap; word-break: break-word; }
    .hr { height: 1px; background: rgba(0,0,0,0.12); margin: 14px 0; }
    details > summary { cursor: pointer; user-select:none; font-weight: 650; }
    details { border-radius: 12px; }

    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(0,0,0,0.22);
      border-radius: 10px;
      padding: 10px 10px;
      background: transparent;
      color: inherit;
    }
    textarea { min-height: 80px; resize: vertical; }
    select[multiple] { min-height: 120px; }

    .group-box {
      border: 1px dashed rgba(0,0,0,0.18);
      border-radius: 12px;
      padding: 10px;
      margin-top: 8px;
    }
    .group-item {
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
    }
    .group-item-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .group-item-title {
      font-size: 13px;
      font-weight: 650;
      opacity: 0.9;
    }

    /* Themes */
    body[data-theme="light"] { background: #ffffff; color: #111111; }
    body[data-theme="dark"] { background: #000000; color: #ffffff; }
    body[data-theme="light-hc"] { background: #ffffff; color: #000000; }
    body[data-theme="dark-hc"] { background: #000000; color: #ffffff; }

    body[data-theme="light"] .card,
    body[data-theme="light"] .btn,
    body[data-theme="light"] input[type="text"],
    body[data-theme="light"] input[type="number"],
    body[data-theme="light"] textarea,
    body[data-theme="light"] select,
    body[data-theme="light"] .pill,
    body[data-theme="light"] .req,
    body[data-theme="light"] .group-box,
    body[data-theme="light"] .group-item {
      border-color: rgba(0,0,0,0.18);
    }

    body[data-theme="dark"] .card,
    body[data-theme="dark"] .btn,
    body[data-theme="dark"] input[type="text"],
    body[data-theme="dark"] input[type="number"],
    body[data-theme="dark"] textarea,
    body[data-theme="dark"] select,
    body[data-theme="dark"] .pill,
    body[data-theme="dark"] .req,
    body[data-theme="dark"] .group-box,
    body[data-theme="dark"] .group-item {
      border-color: rgba(255,255,255,0.26);
    }

    body[data-theme="light-hc"] .card,
    body[data-theme="light-hc"] .btn,
    body[data-theme="light-hc"] input[type="text"],
    body[data-theme="light-hc"] input[type="number"],
    body[data-theme="light-hc"] textarea,
    body[data-theme="light-hc"] select,
    body[data-theme="light-hc"] .pill,
    body[data-theme="light-hc"] .req,
    body[data-theme="light-hc"] .group-box,
    body[data-theme="light-hc"] .group-item {
      border-color: rgba(0,0,0,0.55);
    }

    body[data-theme="dark-hc"] .card,
    body[data-theme="dark-hc"] .btn,
    body[data-theme="dark-hc"] input[type="text"],
    body[data-theme="dark-hc"] input[type="number"],
    body[data-theme="dark-hc"] textarea,
    body[data-theme="dark-hc"] select,
    body[data-theme="dark-hc"] .pill,
    body[data-theme="dark-hc"] .req,
    body[data-theme="dark-hc"] .group-box,
    body[data-theme="dark-hc"] .group-item {
      border-color: rgba(255,255,255,0.55);
    }

    body[data-theme="dark"] .btn,
    body[data-theme="dark-hc"] .btn { background: rgba(255,255,255,0.06); }
    body[data-theme="dark"] .btn:hover,
    body[data-theme="dark-hc"] .btn:hover { background: rgba(255,255,255,0.10); }
    body[data-theme="dark"] .hr,
    body[data-theme="dark-hc"] .hr { background: rgba(255,255,255,0.18); }
    body[data-theme="dark"] .missing,
    body[data-theme="dark-hc"] .missing { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="left">
        <div class="title">PBPK metadata</div>
        <div id="draftPill" class="pill">draft: (not created)</div>
      </div>

      <div class="row">
        <select id="themeSelect" class="btn" style="padding: 9px 10px;">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="light-hc">Light (High contrast)</option>
          <option value="dark-hc">Dark (High contrast)</option>
        </select>
        <a class="btn" href="/ui" style="text-decoration:none; color:inherit;">Back</a>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div class="row">
          <button id="startBlankBtn" class="btn" type="button">Start blank</button>
          <label class="btn" style="display:inline-flex; align-items:center; gap:8px;">
            <span>Import JSON</span>
            <input id="fileInput" type="file" accept="application/json" style="display:none;" />
          </label>
        </div>
        <div class="actions">
          <button id="saveBtn" class="btn" type="button" disabled>Apply edits → draft</button>
          <button id="validateBtn" class="btn" type="button" disabled>Validate</button>
          <button id="buildBtn" class="btn" type="button" disabled>Build RO-Crate</button>
        </div>
      </div>

      <div class="hr"></div>

      <details id="debugPanel">
        <summary>Show debug</summary>
        <div class="small" style="margin-top:10px;">Last API response</div>
        <pre id="lastResp" class="mono"></pre>
      </details>
    </div>

    <div id="formRoot"></div>
  </div>

<script>
  const API = {
    formUI: (opts="") => `/v1/form-ui/pbpk${opts}`,
    drafts: () => `/v1/drafts`,
    applyEdits: (id) => `/v1/drafts/${id}/apply-edits`,
    applyArray: (id) => `/v1/drafts/${id}/apply-array`,
    validate: (id) => `/v1/drafts/${id}/validate`,
    build: (id) => `/v1/drafts/${id}/build`,
    template: (name) => `/v1/form-spec/pbpk/templates/${name}`
  };

  let currentDraftId = null;
  let currentUI = null;
  let currentEdits = {};

  const TEMPLATE_MAP = {
    "/biological_system_description/biological_systems": "biological_systems",
    "/chemical_description/chemicals": "chemicals",
    "/model_evaluation_and_validation/evaluation_activities": "evaluation_activities",
    "/parameterisation/parameters": "parameters",
    "/model_structure_and_representation/structural_compartments": "structural_compartments",
    "/model_structure_and_representation/inter_compartmental_connections": "inter_compartmental_connections",
    "/model_structure_and_representation/model_implementation_reference": "model_implementation_reference",
    "/electronic_files_and_reproducibility/digital_artifacts": "digital_artifacts"
  };

  function setLastResp(obj) {
    const el = document.getElementById("lastResp");
    if (!el) return;
    el.textContent = (typeof obj === "string") ? obj : JSON.stringify(obj, null, 2);
  }

  async function jfetch(url, options={}) {
    const resp = await fetch(url, options);
    const ct = resp.headers.get("content-type") || "";
    let payload = null;
    if (ct.includes("application/json")) payload = await resp.json();
    else payload = await resp.text();

    if (!resp.ok) {
      const msg = (typeof payload === "string") ? payload : JSON.stringify(payload);
      throw new Error(msg);
    }
    return payload;
  }

  function applyTheme(theme) {
    const t = theme || "light";
    document.body.setAttribute("data-theme", t);
    localStorage.setItem("pbpk_theme", t);
    const sel = document.getElementById("themeSelect");
    if (sel && sel.value !== t) sel.value = t;
  }

  function applyThemeFromStorage() {
    const saved = localStorage.getItem("pbpk_theme") || "light";
    applyTheme(saved);
  }

  function setDraftPill() {
    const el = document.getElementById("draftPill");
    el.textContent = currentDraftId ? `draft: ${currentDraftId}` : "draft: (not created)";
  }

  function enableActions(enabled) {
    document.getElementById("saveBtn").disabled = !enabled;
    document.getElementById("validateBtn").disabled = !enabled;
    document.getElementById("buildBtn").disabled = !enabled;
  }

  function renderForm(ui) {
    currentUI = ui;
    currentEdits = {};
    const root = document.getElementById("formRoot");
    root.innerHTML = "";

    ui.sections.forEach(section => {
      const card = document.createElement("div");
      card.className = "card";

      const h = document.createElement("div");
      h.className = "section-title";
      h.textContent = section.title || section.id;

      const d = document.createElement("div");
      d.className = "section-desc";
      d.textContent = section.description || "";

      card.appendChild(h);
      card.appendChild(d);

      (section.fields || []).forEach(field => {
        card.appendChild(renderField(field));
      });

      root.appendChild(card);
    });

    enableActions(true);
  }

  function renderField(field) {
    if (field.widget === "group" || field.value_type === "object") {
      return renderGroupField(field);
    }
    return renderScalarField(field);
  }

  function renderGroupField(field) {
    const wrap = document.createElement("div");
    wrap.className = "field";

    const lab = document.createElement("div");
    lab.className = "label";
    lab.textContent = field.label || field.id;

    if (field.required) {
      const req = document.createElement("span");
      req.className = "req";
      req.textContent = "required";
      lab.appendChild(req);
    }
    if (field.missing) {
      const miss = document.createElement("span");
      miss.className = "missing";
      miss.textContent = "missing";
      lab.appendChild(miss);
    }
    wrap.appendChild(lab);

    const box = document.createElement("div");
    box.className = "group-box";

    const isMany = field.cardinality === "many";
    const items = Array.isArray(field.value) ? field.value : [];
    const arrayPath = field.path;

    if (isMany) {
      const topRow = document.createElement("div");
      topRow.className = "row";

      const addBtn = document.createElement("button");
      addBtn.className = "btn";
      addBtn.type = "button";
      addBtn.textContent = "Add item";
      addBtn.addEventListener("click", async () => {
        try {
          await addGroupItem(arrayPath);
        } catch (e) {
          setLastResp({ error: String(e) });
          document.getElementById("debugPanel").open = true;
        }
      });

      topRow.appendChild(addBtn);
      box.appendChild(topRow);

      items.forEach((item, index) => {
        box.appendChild(renderGroupItem(field, item || {}, index));
      });

      if (items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "small";
        empty.textContent = "No items yet.";
        box.appendChild(empty);
      }
    } else {
      const item = (field.value && typeof field.value === "object") ? field.value : {};
      box.appendChild(renderGroupItem(field, item, null));
    }

    wrap.appendChild(box);
    return wrap;
  }

  function renderGroupItem(field, item, index) {
    const itemBox = document.createElement("div");
    itemBox.className = "group-item";

    const head = document.createElement("div");
    head.className = "group-item-head";

    const title = document.createElement("div");
    title.className = "group-item-title";
    title.textContent = index === null ? (field.label || field.id) : `${field.label || field.id} #${index + 1}`;
    head.appendChild(title);

    if (index !== null) {
      const rmBtn = document.createElement("button");
      rmBtn.className = "btn danger";
      rmBtn.type = "button";
      rmBtn.textContent = "Remove";
      rmBtn.addEventListener("click", async () => {
        try {
          await removeGroupItem(field.path, index);
        } catch (e) {
          setLastResp({ error: String(e) });
          document.getElementById("debugPanel").open = true;
        }
      });
      head.appendChild(rmBtn);
    }

    itemBox.appendChild(head);

    (field.fields || []).forEach(sub => {
      const concrete = Object.assign({}, sub);

      if (index !== null) {
        concrete.path = (sub.path || "").replace("/*/", `/${index}/`).replace("/*", `/${index}`);
      } else {
        concrete.path = sub.path || "";
      }

      try {
        const key = (sub.path || "").split("/").pop();
        if (key && item && typeof item === "object" && key in item) {
          concrete.value = item[key];
        } else {
          concrete.value = (sub.cardinality === "many") ? [] : "";
        }
      } catch (_) {
        concrete.value = (sub.cardinality === "many") ? [] : "";
      }

      itemBox.appendChild(renderScalarField(concrete));
    });

    return itemBox;
  }

  function renderScalarField(field) {
    const wrap = document.createElement("div");
    wrap.className = "field";

    const lab = document.createElement("div");
    lab.className = "label";
    lab.textContent = field.label || field.id;

    if (field.required) {
      const req = document.createElement("span");
      req.className = "req";
      req.textContent = "required";
      lab.appendChild(req);
    }
    if (field.missing) {
      const miss = document.createElement("span");
      miss.className = "missing";
      miss.textContent = "missing";
      lab.appendChild(miss);
    }

    wrap.appendChild(lab);

    const path = field.path;
    let input;

    if (field.value_type === "text") {
      input = document.createElement("textarea");
      input.value = (field.value ?? "");
      input.addEventListener("input", () => {
        currentEdits[path] = input.value;
      });
      wrap.appendChild(input);
      return wrap;
    }

    if (field.value_type === "number") {
      input = document.createElement("input");
      input.type = "number";
      input.value = (field.value ?? "");
      input.addEventListener("input", () => {
        const v = input.value;
        currentEdits[path] = v === "" ? null : Number(v);
      });
      wrap.appendChild(input);
      return wrap;
    }

    if (field.value_type === "controlled_term" && Array.isArray(field.allowed_values)) {
      if (field.cardinality === "many") {
        input = document.createElement("select");
        input.multiple = true;

        field.allowed_values.forEach(v => {
          const opt = document.createElement("option");
          opt.value = v;
          opt.textContent = v;
          input.appendChild(opt);
        });

        const current = Array.isArray(field.value) ? field.value : [];
        Array.from(input.options).forEach(opt => {
          opt.selected = current.includes(opt.value);
        });

        input.addEventListener("change", () => {
          const vals = Array.from(input.selectedOptions).map(o => o.value);
          currentEdits[path] = vals;
        });

        wrap.appendChild(input);
        return wrap;
      } else {
        input = document.createElement("select");
        const opt0 = document.createElement("option");
        opt0.value = "";
        opt0.textContent = "";
        input.appendChild(opt0);

        field.allowed_values.forEach(v => {
          const opt = document.createElement("option");
          opt.value = v;
          opt.textContent = v;
          input.appendChild(opt);
        });

        input.value = (field.value ?? "");
        input.addEventListener("change", () => {
          currentEdits[path] = input.value;
        });

        wrap.appendChild(input);
        return wrap;
      }
    }

    if (field.cardinality === "many") {
      input = document.createElement("textarea");
      input.value = Array.isArray(field.value) ? field.value.join("\n") : "";
      input.addEventListener("input", () => {
        currentEdits[path] = input.value
          .split("\n")
          .map(s => s.trim())
          .filter(Boolean);
      });
      wrap.appendChild(input);
      return wrap;
    }

    input = document.createElement("input");
    input.type = "text";
    input.value = (field.value ?? "");
    input.addEventListener("input", () => {
      currentEdits[path] = input.value;
    });

    wrap.appendChild(input);
    return wrap;
  }

  async function fetchTemplateForPath(arrayPath) {
    const name = TEMPLATE_MAP[arrayPath];
    if (!name) return {};
    try {
      const out = await jfetch(API.template(name));
      return out.value || {};
    } catch (_) {
      return {};
    }
  }

  async function addGroupItem(arrayPath) {
    if (!currentDraftId) throw new Error("No draft_id");
    const value = await fetchTemplateForPath(arrayPath);

    const out = await jfetch(API.applyArray(currentDraftId), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        array_path: arrayPath,
        action: "append",
        value: value
      })
    });

    setLastResp(out);
    await reloadFormFromDraft();
  }

  async function removeGroupItem(arrayPath, index) {
    if (!currentDraftId) throw new Error("No draft_id");

    const out = await jfetch(API.applyArray(currentDraftId), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        array_path: arrayPath,
        action: "remove_index",
        index: index
      })
    });

    setLastResp(out);
    await reloadFormFromDraft();
  }

  async function ensureDraftExistsFromMetadata(metadataObj) {
    if (currentDraftId) return currentDraftId;

    const draft = await jfetch(API.drafts(), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(metadataObj || {})
    });

    currentDraftId = draft.draft_id;
    setDraftPill();
    return currentDraftId;
  }

  async function loadFormFromMetadata(metadataObj) {
    const ui = await jfetch(API.formUI("?include_helptexts=true&include_vocabularies=true"), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(metadataObj || {})
    });

    renderForm(ui);
    setLastResp(ui);
    await ensureDraftExistsFromMetadata(metadataObj || {});
  }

  async function reloadFormFromDraft() {
    if (!currentDraftId) return;
    const ui = await jfetch(API.formUI("?include_helptexts=false&include_vocabularies=true"), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ draft_id: currentDraftId })
    });
    renderForm(ui);
  }

  async function applyEdits() {
    if (!currentDraftId) throw new Error("No draft_id");

    const payload = { edits: currentEdits };

    const out = await jfetch(API.applyEdits(currentDraftId), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    setLastResp(out);
    await reloadFormFromDraft();
  }

  async function validateDraft() {
    if (!currentDraftId) throw new Error("No draft_id");
    const out = await jfetch(API.validate(currentDraftId), { method: "POST" });
    setLastResp(out);
  }

  async function buildCrate() {
    if (!currentDraftId) throw new Error("No draft_id");
    const out = await jfetch(API.build(currentDraftId), { method: "POST" });
    setLastResp(out);
  }

  document.getElementById("themeSelect").addEventListener("change", (e) => applyTheme(e.target.value));

  document.getElementById("startBlankBtn").addEventListener("click", async () => {
    try {
      currentDraftId = null;
      setDraftPill();
      await loadFormFromMetadata({});
    } catch (e) {
      setLastResp({ error: String(e) });
      document.getElementById("debugPanel").open = true;
    }
  });

  document.getElementById("saveBtn").addEventListener("click", async () => {
    try {
      await applyEdits();
    } catch (e) {
      setLastResp({ error: String(e) });
      document.getElementById("debugPanel").open = true;
    }
  });

  document.getElementById("validateBtn").addEventListener("click", async () => {
    try {
      await validateDraft();
    } catch (e) {
      setLastResp({ error: String(e) });
      document.getElementById("debugPanel").open = true;
    }
  });

  document.getElementById("buildBtn").addEventListener("click", async () => {
    try {
      await buildCrate();
    } catch (e) {
      setLastResp({ error: String(e) });
      document.getElementById("debugPanel").open = true;
    }
  });

  document.getElementById("fileInput").addEventListener("change", async (ev) => {
    try {
      const f = ev.target.files && ev.target.files[0];
      if (!f) return;
      const txt = await f.text();
      const obj = JSON.parse(txt);
      currentDraftId = null;
      setDraftPill();
      await loadFormFromMetadata(obj);
    } catch (e) {
      setLastResp({ error: String(e) });
      document.getElementById("debugPanel").open = true;
    }
  });

  (async function boot() {
    applyThemeFromStorage();
    setDraftPill();
    enableActions(false);
    try {
      await loadFormFromMetadata({});
    } catch (e) {
      setLastResp({ error: String(e) });
      document.getElementById("debugPanel").open = true;
    }
  })();
</script>
</body>
</html>
