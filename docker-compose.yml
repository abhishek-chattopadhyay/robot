services:
  robot:
    build: .
    container_name: robot-app
    ports:
      - "8000:8000"
    volumes:
      - robot_data:/app/var
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ui"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  robot_data:
